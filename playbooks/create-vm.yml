---
- name: Automate RHEL 9 VM and Web Server Provisioning with RHSM
  hosts: localhost
  connection: local
  
  # This securely prompts you for your Red Hat account password when you execute the playbook
  vars_prompt:
    - name: rhsm_password
      prompt: "Enter your Red Hat Subscription Password"
      private: yes

  vars:
    vm_name: "rhel-9-web-server"
    target_namespace: "kent-kamau-dev"
    storage_class: "gp3"
    vm_size: "u1.small" 
    rhsm_username: "kent.kamau@envisionglobal.co.ke"

  tasks:
    - name: Deploy Virtual Machine Definition
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: kubevirt.io/v1
          kind: VirtualMachine
          metadata:
            name: "{{ vm_name }}"
            namespace: "{{ target_namespace }}"
          spec:
            runStrategy: Manual 
            dataVolumeTemplates:
              - metadata:
                  name: "{{ vm_name }}-volume"
                spec:
                  sourceRef:
                    kind: DataSource
                    name: rhel9
                    namespace: openshift-virtualization-os-images
                  storage:
                    storageClassName: "{{ storage_class }}"
                    resources:
                      requests:
                        storage: 30Gi
            instancetype:
              kind: VirtualMachineClusterInstancetype
              name: "{{ vm_size }}"
            preference:
              kind: VirtualMachineClusterPreference
              name: rhel.9
            template:
              metadata:
                labels:
                  kubevirt.io/domain: "{{ vm_name }}"
                  app: web-server
              spec:
                tolerations:
                  - effect: NoSchedule
                    key: sandbox-cnv
                    operator: Exists
                domain:
                  devices:
                    interfaces:
                      - name: default
                        masquerade: {}
                    disks:
                      - bootOrder: 1
                        name: rootdisk
                        disk: { bus: virtio }
                      - name: cloudinitdisk
                        disk: { bus: virtio }
                networks:
                  - name: default
                    pod: {}
                volumes:
                  - name: rootdisk
                    dataVolume:
                      name: "{{ vm_name }}-volume"
                  - name: cloudinitdisk
                    cloudInitNoCloud:
                      userData: |
                        #cloud-config
                        user: rhel
                        password: redhat
                        chpasswd: { expire: False }
                        
                        # Command sequence to register with RHSM and fetch packages natively
                        runcmd:
                          - subscription-manager register --username="{{ rhsm_username }}" --password="{{ rhsm_password }}" --auto-attach
                          - dnf install -y httpd
                          - systemctl enable --now httpd
                          - echo "<h1>Welcome to RHEL 9 (Registered via RHSM)</h1>" > /var/www/html/index.html
                          - firewall-offline-cmd --zone=public --add-service=http --permanent
                          - firewall-cmd --reload
                          
                        ssh_authorized_keys:
                          - "ssh-rsa  sandbox@cnv"

    - name: Create Service to expose Web Server
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: Service
          metadata:
            name: "{{ vm_name }}-svc"
            namespace: "{{ target_namespace }}"
          spec:
            selector:
              kubevirt.io/domain: "{{ vm_name }}"
            ports:
              - port: 80
                targetPort: 80

    - name: Create OpenShift Route
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: route.openshift.io/v1
          kind: Route
          metadata:
            name: "{{ vm_name }}-route"
            namespace: "{{ target_namespace }}"
          spec:
            to:
              kind: Service
              name: "{{ vm_name }}-svc"
            port:
              targetPort: 80
