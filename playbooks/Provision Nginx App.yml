---
- name: Orchestrate Cloud-Native Apps on OpenShift Sandbox
  hosts: localhost
  connection: local
  vars:
    namespace: "kent-kamau-dev"
    app_name: "enterprise-web-app"

  tasks:
    - name: Ensure Database Configuration Secret Exists
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: Secret
          metadata:
            name: db-credentials
            namespace: "{{ namespace }}"
          type: Opaque
          stringData:
            database-user: "admin"
            database-password: "SecurePassword123!"

    - name: Deploy PostgreSQL Database Pod
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: "{{ app_name }}-db"
            namespace: "{{ namespace }}"
          spec:
            replicas: 1
            selector:
              matchLabels:
                tier: database
            template:
              metadata:
                labels:
                  tier: database
              spec:
                containers:
                  - name: postgresql
                    image: registry.redhat.io/rhel9/postgresql-15:latest
                    env:
                      - name: POSTGRESQL_USER
                        valueFrom:
                          secretKeyRef:
                            name: db-credentials
                            key: database-user
                      - name: POSTGRESQL_PASSWORD
                        valueFrom:
                          secretKeyRef:
                            name: db-credentials
                            key: database-password
                      - name: POSTGRESQL_DATABASE
                        value: "production_db"

    - name: Deploy Frontend Web Server Service
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: Service
          metadata:
            name: "{{ app_name }}-svc"
            namespace: "{{ namespace }}"
          spec:
            selector:
              tier: frontend
            ports:
              - port: 8080
                targetPort: 8080

    - name: Create OpenShift Route for Web Access
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: route.openshift.io/v1
          kind: Route
          metadata:
            name: "{{ app_name }}-route"
            namespace: "{{ namespace }}"
          spec:
            to:
              kind: Service
              name: "{{ app_name }}-svc"
            port:
              targetPort: 8080