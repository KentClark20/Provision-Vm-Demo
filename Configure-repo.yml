---
- name: Configure Repos and Web Server via Cloud-Init Update
  hosts: localhost
  connection: local
  vars:
    vm_name: "rhel-9-web-server"
    target_namespace: "kent-kamau-dev"
    baseos_url: "http://mirror.centos.org/centos/9-stream/BaseOS/x86_64/os/"
    appstream_url: "http://mirror.centos.org/centos/9-stream/AppStream/x86_64/os/"

  tasks:
    - name: Inject Repository and Web Server configuration into existing VM
      kubernetes.core.k8s:
        state: patched
        kind: VirtualMachine
        name: "{{ vm_name }}"
        namespace: "{{ target_namespace }}"
        definition:
          spec:
            template:
              spec:
                volumes:
                  - name: cloudinitdisk
                    cloudInitNoCloud:
                      userData: |
                        #cloud-config
                        user: rhel
                        password: redhat
                        chpasswd: { expire: False }
                        yum_repos:
                          rhel-9-baseos:
                            name: RHEL 9 BaseOS
                            baseurl: "{{ baseos_url }}"
                            enabled: true
                            gpgcheck: false
                          rhel-9-appstream:
                            name: RHEL 9 AppStream
                            baseurl: "{{ appstream_url }}"
                            enabled: true
                            gpgcheck: false
                        packages:
                          - httpd
                        runcmd:
                          - systemctl enable --now httpd
                          - echo "<h1>Web Server Configured Successfully!</h1>" > /var/www/html/index.html

    - name: Create Service to expose Web Server
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: Service
          metadata:
            name: "{{ vm_name }}-svc"
            namespace: "{{ target_namespace }}"
          spec:
            selector:
              kubevirt.io/domain: "{{ vm_name }}"
            ports:
              - port: 80
                targetPort: 80

    - name: Create OpenShift Route (Your Reachable Endpoint)
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: route.openshift.io/v1
          kind: Route
          metadata:
            name: "{{ vm_name }}-route"
            namespace: "{{ target_namespace }}"
          spec:
            to:
              kind: Service
              name: "{{ vm_name }}-svc"
            port:
              targetPort: 80

    - name: Display reachability URL
      kubernetes.core.k8s_info:
        api_version: route.openshift.io/v1
        kind: Route
        name: "{{ vm_name }}-route"
        namespace: "{{ target_namespace }}"
      register: route_info

    - name: Show your website link
      ansible.builtin.debug:
        msg: "Your web server will be accessible at: http://{{ route_info.resources[0].spec.host }}"
