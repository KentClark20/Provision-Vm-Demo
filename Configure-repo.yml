---
- name: Configure Repositories and Expose Web Server
  hosts: localhost
  connection: local
  vars:
    vm_name: "rhel-9-web-server"
    target_namespace: "kent-kamau-dev"
    baseos_url: "http://mirror.centos.org/centos/9-stream/BaseOS/x86_64/os/"
    appstream_url: "http://mirror.centos.org/centos/9-stream/AppStream/x86_64/os/"

  tasks:
    - name: Create Service to target the VM
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: Service
          metadata:
            name: "{{ vm_name }}-svc"
            namespace: "{{ target_namespace }}"
          spec:
            selector:
              kubevirt.io/domain: "{{ vm_name }}"
            ports:
              - port: 80
                targetPort: 80

    - name: Create OpenShift Route (Your Public Endpoint)
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: route.openshift.io/v1
          kind: Route
          metadata:
            name: "{{ vm_name }}-route"
            namespace: "{{ target_namespace }}"
          spec:
            to:
              kind: Service
              name: "{{ vm_name }}-svc"
            port:
              targetPort: 80

    - name: Output Repository and Web Server Configuration Script
      ansible.builtin.debug:
        msg:
          - "--------------------------------------------------------"
          - "PUBLIC ENDPOINT TO REACH YOUR WEBSITE:"
          - "Run 'oc get route {{ vm_name }}-route -n {{ target_namespace }}' to get your URL."
          - "--------------------------------------------------------"
          - "Since your VM already exists, execute these commands inside your VM terminal"
          - "to instantly configure the repositories and start the web server:"
          - "--------------------------------------------------------"
          - "sudo tee /etc/yum.repos.d/centos-stream.repo <<EOF"
          - "[baseos]"
          - "name=CentOS Stream BaseOS"
          - "baseurl={{ baseos_url }}"
          - "gpgcheck=0"
          - "enabled=1"
          - ""
          - "[appstream]"
          - "name=CentOS Stream AppStream"
          - "baseurl={{ appstream_url }}"
          - "gpgcheck=0"
          - "enabled=1"
          - "EOF"
          - "sudo dnf install -y httpd"
          - "sudo systemctl enable --now httpd"
          - "sudo echo '<h1>Web Server Configured Successfully</h1>' > /var/www/html/index.html"
          - "--------------------------------------------------------"
