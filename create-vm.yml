---
- name: Provision OpenShift VirtualMachine
  hosts: localhost
  connection: local
  vars:
    vm_name: "centos"
    namespace: "kent-kamau-dev" 
    image_source: "https://cloud.centos.org/centos/7/images/CentOS-7-x86_64-GenericCloud.qcow2"

  tasks:
    - name: Create VM from Manifest
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: kubevirt.io/v1
          kind: VirtualMachine
          metadata:
            name: "{{ vm_name }}"
            namespace: "{{ namespace }}"
          spec:
            running: true
            template:
              metadata:
                labels:
                  kubevirt.io/vm: "{{ vm_name }}"
              spec:
                domain:
                  devices:
                    disks:
                      - disk:
                          bus: virtio
                        name: containerdisk
                      - disk:
                          bus: virtio
                        name: cloudinitdisk
                  resources:
                    requests:
                      memory: 2Gi
                volumes:
                  - name: containerdisk
                    containerDisk:
                      image: quay.io/containerdisks/centos:7-2009
                  - name: cloudinitdisk
                    cloudInitNoCloud:
                      userData: |
                        #cloud-config
                        password: password123
                        chpasswd: { expire: False }