---
- name: Automate RHEL 9 VM and Web Server Provisioning
  hosts: localhost
  connection: local
  vars:
    # --- AUTHENTICATION ---
    api_url: "https://api.rm1.0a51.p1.openshiftapps.com:6443"
    api_token: "sha256~rvAng2slrlpJyN1f3fNvUcJbOvkECGDeyIEt5oLxK-g"

    # --- VM CONFIGURATION ---
    vm_name: "rhel-9-web-server"
    target_namespace: "kent-kamau-dev"
    storage_class: "gp3"
    # Using small to avoid the ResourceQuota 'compute-deploy' limit
    vm_size: "u1.small" 

  tasks:
    - name: Deploy and Start Virtual Machine
      kubernetes.core.k8s:
        host: "{{ api_url }}"
        api_key: "{{ api_token }}"
        validate_certs: false
        state: present
        definition:
          apiVersion: kubevirt.io/v1
          kind: VirtualMachine
          metadata:
            name: "{{ vm_name }}"
            namespace: "{{ target_namespace }}"
          spec:
            runStrategy: Always # This ensures the VM starts automatically
            dataVolumeTemplates:
              - metadata:
                  name: "{{ vm_name }}-volume"
                spec:
                  sourceRef:
                    kind: DataSource
                    name: rhel9
                    namespace: openshift-virtualization-os-images
                  storage:
                    storageClassName: "{{ storage_class }}"
                    resources:
                      requests:
                        storage: 30Gi
            instancetype:
              kind: VirtualMachineClusterInstancetype
              name: "{{ vm_size }}"
            preference:
              kind: VirtualMachineClusterPreference
              name: rhel.9
            template:
              metadata:
                labels:
                  network.kubevirt.io/headlessService: headless
                  app: web-server # Added label for potential service discovery
              spec:
                tolerations:
                  - effect: NoSchedule
                    key: sandbox-cnv
                    operator: Exists
                domain:
                  devices:
                    autoattachPodInterface: false
                    disks:
                      - bootOrder: 1
                        name: rootdisk
                        disk:
                          bus: virtio
                      - name: cloudinitdisk
                        disk:
                          bus: virtio
                    interfaces:
                      - name: default
                        masquerade: {}
                networks:
                  - name: default
                    pod: {}
                subdomain: headless
                volumes:
                  - name: rootdisk
                    dataVolume:
                      name: "{{ vm_name }}-volume"
                  - name: cloudinitdisk
                    cloudInitNoCloud:
                      userData: |
                        #cloud-config
                        user: rhel
                        password: redhat
                        chpasswd: { expire: False }
                        # Install and Start Web Server
                        packages:
                          - httpd
                        runcmd:
                          - systemctl enable --now httpd
                          - echo "<h1>Welcome to RHEL 9 on OpenShift Virtualization</h1>" > /var/www/html/index.html
                          - firewall-offline-cmd --add-service=http
                        ssh_authorized_keys:
                          - "ssh-rsa  sandbox@cnv"