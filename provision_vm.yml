---
- name: Automate RHEL 9 VM Provisioning
  hosts: localhost
  connection: local
  vars:
    # Environment Configuration
    vm_name: "rhel-9-demo-vm"
    target_namespace: "kent-kamau-dev"
    storage_class: "gp3"
    
    # Sizing and Tuning
    instance_type_kind: "VirtualMachineClusterInstancetype"
    vm_size: "u1.medium"
    preference_kind: "VirtualMachineClusterPreference"
    os_preference: "rhel.9"

  tasks:
    - name: Verify target namespace exists
      kubernetes.core.k8s_info:
        kind: Namespace
        name: "{{ target_namespace }}"
        validate_certs: false  # Bypasses SSL verification issues
      register: ns_check

    - name: Halt if namespace is missing or API failed
      fail:
        msg: "Namespace {{ target_namespace }} not found or API unreachable."
      when: ns_check.resources is not defined or ns_check.resources | length == 0

    - name: Deploy Virtual Machine instance
      kubernetes.core.k8s:
        state: present
        validate_certs: false
        definition:
          apiVersion: kubevirt.io/v1
          kind: VirtualMachine
          metadata:
            name: "{{ vm_name }}"
            namespace: "{{ target_namespace }}"
          spec:
            runStrategy: Always
            dataVolumeTemplates:
              - metadata:
                  name: "{{ vm_name }}-storage"
                spec:
                  sourceRef:
                    kind: DataSource
                    name: rhel9
                    namespace: openshift-virtualization-os-images
                  storage:
                    storageClassName: "{{ storage_class }}"
                    resources:
                      requests:
                        storage: 30Gi
            
            # Resource Definition
            instancetype:
              kind: "{{ instance_type_kind }}"
              name: "{{ vm_size }}"
            preference:
              kind: "{{ preference_kind }}"
              name: "{{ os_preference }}"
            
            template:
              metadata:
                labels:
                  network.kubevirt.io/headlessService: headless
              spec:
                domain:
                  devices:
                    autoattachPodInterface: false
                    disks:
                      - bootOrder: 1
                        name: root-disk
                    interfaces:
                      - name: default
                        masquerade: {}
                networks:
                  - name: default
                    pod: {}
                subdomain: headless
                volumes:
                  - name: root-disk
                    dataVolume:
                      name: "{{ vm_name }}-storage"
                  - name: cloud-init
                    cloudInitNoCloud:
                      userData: |
                        #cloud-config
                        user: rhel
                        password: redhat
                        chpasswd: { expire: False }